<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h2>🩸 Donor Registration</h2>

    <form method="POST">

        <input type="text"
               name="name"
               placeholder="Name / పేరు"
               required>

        <input type="number"
               name="age"
               placeholder="Age / వయస్సు"
               min="18"
               max="65"
               required>

        <select name="gender" required>

            <option value="">
                Select Gender / లింగం
            </option>

            <option>Male</option>

            <option>Female</option>

            <option>Transgender</option>

        </select>

        <select name="blood" required>

            <option value="">
                Select Blood Group
            </option>

            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>

        </select>

        <input type="text"
               name="phone"
               placeholder="Phone Number"
               autocomplete="off"
               required>

        <input type="text"
               name="pincode"
               placeholder="PIN Code"
               maxlength="6"
               pattern="[0-9]{6}"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')"
               autocomplete="off"
               required>

        <input type="password"
               name="password"
               placeholder="Create Password"
               autocomplete="new-password"
               required>

        <button type="submit">

            Register

        </button>

    </form>

    <a href="/">

        <button class="back">

            Back Home

        </button>

    </a>

</div>

</body>
</html>

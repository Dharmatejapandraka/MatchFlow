<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            height:100vh;
            overflow:hidden;
            background:linear-gradient(135deg,#ff416c,#ff4b2b);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .floating{
            position:absolute;
            width:120px;
            height:120px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            animation:float 6s infinite ease-in-out;
        }

        .one{
            top:10%;
            left:10%;
        }

        .two{
            bottom:10%;
            right:15%;
            animation-delay:2s;
        }

        .three{
            top:50%;
            left:80%;
            animation-delay:4s;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-20px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        .login-card{
            width:420px;
            background:white;
            border-radius:30px;
            padding:50px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            animation:fadeIn 1.2s ease;
            position:relative;
            z-index:10;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            font-size:70px;
            color:#8B0000;
            animation:pulse 2s infinite;
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.08);
            }
            100%{
                transform:scale(1);
            }
        }

        h1{
            margin-top:10px;
            font-size:45px;
            color:#333;
        }

        .subtitle{
            color:gray;
            margin-bottom:35px;
            font-size:18px;
        }

        input{
            width:90%;
            padding:16px;
            margin-top:18px;
            border-radius:15px;
            border:1px solid #ccc;
            font-size:18px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border:2px solid #ff416c;
            transform:scale(1.02);
        }

        .login-btn{
            margin-top:35px;
            width:100%;
            padding:16px;
            border:none;
            border-radius:50px;
            background:linear-gradient(to right,#ff416c,#ff4b2b);
            color:white;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-5px);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .bottom-links{
            margin-top:30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .bottom-links a{
            text-decoration:none;
        }

        .register-btn{
            color:#ff416c;
            font-size:20px;
            font-weight:bold;
        }

        .home-btn{
            background:black;
            color:white;
            padding:12px 25px;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="floating one"></div>
<div class="floating two"></div>
<div class="floating three"></div>

<div class="login-card">

    <div class="logo">
        🩸
    </div>

    <h1>Welcome Back</h1>

    <div class="subtitle">
        Login to continue saving lives
    </div>

    <form method="POST" autocomplete="off">

        <input type="text"
               name="phone"
               autocomplete="off"
               placeholder="📱 Phone Number"
               required>

        <input type="password"
               name="password"
               autocomplete="new-password"
               placeholder="🔒 Password"
               required>

        <button type="submit" class="login-btn">

            Login

        </button>

    </form>

    <div class="bottom-links">

        <a href="/register"
           class="register-btn">

            Register

        </a>

        <a href="/">

            <span class="home-btn">

                Home

            </span>

        </a>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">

    <title>MatchFlow</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            height:100vh;
            overflow:hidden;
            background:linear-gradient(135deg,#ff416c,#ff4b2b);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .hero{
            text-align:center;
            color:white;
            animation:fadeIn 1.5s ease;
        }

        .logo{
            font-size:90px;
            animation:pulse 2s infinite;
        }

        h1{
            font-size:80px;
            margin:0;
            font-weight:bold;
            letter-spacing:2px;
        }

        .tagline{
            margin-top:20px;
            font-size:32px;
            color:#ffeaea;
        }

        .sub-text{
            margin-top:15px;
            font-size:20px;
            color:#fff5f5;
        }

        .btn-group{
            margin-top:50px;
            display:flex;
            justify-content:center;
            gap:25px;
            flex-wrap:wrap;
        }

        .hero-btn{
            padding:18px 40px;
            border:none;
            border-radius:50px;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        .register-btn{
            background:white;
            color:#ff416c;
        }

        .login-btn{
            background:black;
            color:white;
        }

        .admin-btn{
            background:#ffd700;
            color:black;
        }

        .hero-btn:hover{
            transform:translateY(-5px) scale(1.05);
        }

        .floating{
            position:absolute;
            width:120px;
            height:120px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            animation:float 6s infinite ease-in-out;
        }

        .one{
            top:10%;
            left:10%;
        }

        .two{
            bottom:10%;
            right:15%;
            animation-delay:2s;
        }

        .three{
            top:50%;
            left:80%;
            animation-delay:4s;
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.08);
            }
            100%{
                transform:scale(1);
            }
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-20px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="floating one"></div>
<div class="floating two"></div>
<div class="floating three"></div>

<div class="hero">

    <div class="logo" style="color:#8B0000;">
    🩸
</div>

    <h1>MatchFlow</h1>

    <div class="tagline">
        Every Drop Counts — Connecting Donors, Saving Lives
    </div>

    <div class="sub-text">
        Smart Blood Donation Platform for Faster Emergency Response
    </div>

    <div class="btn-group">

        <a href="/register">

            <button class="hero-btn register-btn">

                Register

            </button>

        </a>

        <a href="/login">

            <button class="hero-btn login-btn">

                Login

            </button>

        </a>

        <a href="/admin">

            <button class="hero-btn admin-btn">

                Admin

            </button>

        </a>

    </div>

</div>

</body>
</html>

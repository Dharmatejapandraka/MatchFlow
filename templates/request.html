<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">

    <title>Raise Blood Request</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h2>🩸 Raise Blood Request</h2>

    <form method="POST">

        <select name="blood" required>

            <option value="">
                Select Blood Group
            </option>

            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>

        </select>

        <input type="number"
               name="amount"
               placeholder="Required Blood Amount (ML)"
               required>

        <input type="date"
               name="required_date"
               required>

       <div style="display:flex; gap:10px;">

    <input type="time"
           name="required_time"
           required
           style="width:70%;">

    <select name="time_period"
            required
            style="width:30%;">

        <option value="AM">AM</option>

        <option value="PM">PM</option>

    </select>

</div>

        <input type="text"
               name="pincode"
               placeholder="Required PIN Code"
               maxlength="6"
       pattern="[0-9]{6}"
       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
               autocomplete="off"
               required>

        <button type="submit">

            Send Request

        </button>

    </form>

    <br>

    <a href="/profile">

        <button class="back">

            Back Profile

        </button>

    </a>

</div>

</body>
</html>
